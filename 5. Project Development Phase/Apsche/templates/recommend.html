<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recommendation</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body style="background:#f4f7f6;">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-lg p-5">

<h2 class="text-center text-success mb-4">
🌱 Crop Recommendation
</h2>

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Nitrogen (N)</label>
<input type="number" class="form-control" name="N" required>
</div>

<div class="col-md-6 mb-3">
<label>Phosphorous (P)</label>
<input type="number" class="form-control" name="P" required>
</div>

<div class="col-md-6 mb-3">
<label>Potassium (K)</label>
<input type="number" class="form-control" name="K" required>
</div>

<div class="col-md-6 mb-3">
<label>Temperature</label>
<input type="number" step="0.01" class="form-control" name="temperature" required>
</div>

<div class="col-md-6 mb-3">
<label>Humidity</label>
<input type="number" step="0.01" class="form-control" name="humidity" required>
</div>

<div class="col-md-6 mb-3">
<label>pH</label>
<input type="number" step="0.01" class="form-control" name="ph" required>
</div>

<div class="col-md-12 mb-3">
<label>Rainfall</label>
<input type="number" step="0.01" class="form-control" name="rainfall" required>
</div>

</div>

<div class="text-center">

<button class="btn btn-success btn-lg">
Predict Crop
</button>

</div>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
